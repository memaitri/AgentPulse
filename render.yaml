services:
  - type: web
    name: agentpulse
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentpulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: agentpulse-db
    databaseName: agentpulse
    user: agentpulse
